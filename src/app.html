<!doctype html>
<html lang="fr">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/x-icon" href="%sveltekit.assets%/favicon.ico" />
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32.png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="mask-icon" href="%sveltekit.assets%/icon.svg" color="#6c63ff" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#6c63ff" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="Brigade Sucrée" />
		<link rel="canonical" href="https://brigadesucree.app" />
		<!--
		  Le <title>, meta description et OG/Twitter sont définis par
		  chaque page via <svelte:head> (cf. LandingSEO.svelte pour /,
		  +page.svelte pour /confidentialite et /mentions-legales).
		  Fallback générique :
		-->
		<title>Brigade Sucrée — Ton CAP Pâtissier</title>

		<!-- Force le domaine canonique : redirige .pages.dev et www vers l'apex brigadesucree.app -->
		<script>
			(function(){
				var h = location.hostname;
				if (h === 'brigade-sucree.pages.dev' || h === 'www.brigadesucree.app') {
					location.replace('https://brigadesucree.app' + location.pathname + location.search + location.hash);
				}
			})();
		</script>

		<!-- Consent Mode v2 : DENIED par défaut, sera "granted" si user accepte -->
		<script>
			window.dataLayer = window.dataLayer || [];
			window.gtag = function gtag(){ window.dataLayer.push(arguments); };
			window.gtag('consent', 'default', {
				ad_storage: 'denied',
				analytics_storage: 'denied',
				ad_user_data: 'denied',
				ad_personalization: 'denied',
				wait_for_update: 500,
				region: ['EU','EEA','GB','CH']
			});
		</script>

		<!-- Google Tag Manager -->
		<script>
			(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
			new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
			j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
			'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
			})(window,document,'script','dataLayer','GTM-KRKFJLVD');
		</script>
		<!-- End Google Tag Manager -->

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="tap">
		<!-- Google Tag Manager (noscript) -->
		<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KRKFJLVD"
			height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
		<!-- End Google Tag Manager (noscript) -->

		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
