name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Validate JSON files
        run: |
          for f in $(find . -name "*.json" -not -path "./node_modules/*" -not -path "./.svelte-kit/*" -not -path "./build/*" -not -path "./package-lock.json"); do
            echo "Checking $f..."
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8'))" || exit 1
          done
          echo "✅ All JSON files valid"

      - name: Build production
        run: npm run build
        env:
          # Variables factices pour permettre le build (les vraies sont sur Cloudflare Pages)
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder.placeholder.placeholder

      - name: Check build output
        run: |
          test -f build/200.html || (echo "❌ build/200.html missing (SPA fallback)" && exit 1)
          test -d build/_app/immutable || (echo "❌ _app/immutable missing" && exit 1)
          if [ -f build/index.html ]; then
            echo "✅ build/index.html présent (prerender Landing OK)"
          else
            echo "⚠️ build/index.html absent (prerender Landing skipped — env factices ou crash silencieux)"
          fi
          echo "✅ Build output OK (SPA shell + _app/immutable présents)"
          echo "Bundle size:"
          du -sh build/_app/immutable/

      - name: Check critical files
        run: |
          test -f static/_headers || (echo "❌ static/_headers missing" && exit 1)
          test -f static/icon-192.png || (echo "❌ icon-192.png missing" && exit 1)
          test -f static/icon-512.png || (echo "❌ icon-512.png missing" && exit 1)
          echo "✅ Static assets OK"

      - name: Show staging URL
        if: github.ref == 'refs/heads/staging'
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🔗 Preview staging (disponible dans ~90s)"
          echo "     https://staging.brigade-sucree.pages.dev"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ─────────────────────────────────────────────────────────────
  # Job security — scan secrets + vulnérabilités npm
  # Tourne sur chaque push main (prod) + PR vers main
  # ─────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 8
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # besoin de tout l'historique pour git ls-files

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Scan secrets & vulnérabilités
        run: node scripts/security-scan.js
        env:
          CI: true

      - name: npm audit (auto-fix si possible)
        run: |
          echo "=== npm audit (production deps) ==="
          npm audit --production --json > /tmp/audit.json 2>/dev/null || true
          # Afficher un résumé lisible
          node -e "
            const a = JSON.parse(require('fs').readFileSync('/tmp/audit.json','utf8'));
            const meta = a.metadata?.vulnerabilities ?? {};
            const total = (meta.critical??0)+(meta.high??0)+(meta.moderate??0)+(meta.low??0);
            console.log('Vulnérabilités :', JSON.stringify(meta));
            if ((meta.critical??0) > 0) { console.error('❌ Vulnérabilités critiques détectées !'); process.exit(1); }
            console.log('✅ Audit OK (' + total + ' vulns dont 0 critiques)');
          "
        env:
          CI: true

      - name: Résumé si succès
        if: success()
        run: |
          echo ""
          echo "✅ Security scan OK — aucun secret ni nouvelle vuln critique."

  # ─────────────────────────────────────────────────────────────
  # Job post-prod — sync docs après push en production
  # ─────────────────────────────────────────────────────────────
  post-prod-docs:
    name: Post-Prod Docs Sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Sync CHANGELOG post-push
        run: node scripts/sync-docs.js

      - name: Commit docs si changements
        run: |
          git config user.name  "Brigade Sucrée Bot"
          git config user.email "bot@brigadesucree.app"
          git add CHANGELOG.md docs/
          git diff --staged --quiet && echo "Docs déjà à jour." || (
            git commit -m "docs(auto): post-prod sync [skip ci]"
            git push
          )
