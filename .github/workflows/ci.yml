name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Validate JSON files
        run: |
          for f in $(find . -name "*.json" -not -path "./node_modules/*" -not -path "./.svelte-kit/*" -not -path "./build/*" -not -path "./package-lock.json"); do
            echo "Checking $f..."
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8'))" || exit 1
          done
          echo "✅ All JSON files valid"

      - name: Build production
        run: npm run build
        env:
          # Variables factices pour permettre le build (les vraies sont sur Cloudflare Pages)
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder.placeholder.placeholder

      - name: Check build output
        run: |
          test -f build/200.html || (echo "❌ build/200.html missing (SPA fallback)" && exit 1)
          test -d build/_app/immutable || (echo "❌ _app/immutable missing" && exit 1)
          if [ -f build/index.html ]; then
            echo "✅ build/index.html présent (prerender Landing OK)"
          else
            echo "⚠️ build/index.html absent (prerender Landing skipped — env factices ou crash silencieux)"
          fi
          echo "✅ Build output OK (SPA shell + _app/immutable présents)"
          echo "Bundle size:"
          du -sh build/_app/immutable/

      - name: Check critical files
        run: |
          test -f static/_headers || (echo "❌ static/_headers missing" && exit 1)
          test -f static/icon-192.png || (echo "❌ icon-192.png missing" && exit 1)
          test -f static/icon-512.png || (echo "❌ icon-512.png missing" && exit 1)
          echo "✅ Static assets OK"

      - name: Show staging URL
        if: github.ref == 'refs/heads/staging'
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🔗 Preview staging (disponible dans ~90s)"
          echo "     https://staging.brigade-sucree.pages.dev"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ─────────────────────────────────────────────────────────────
  # Job security — scan secrets + vulnérabilités npm
  # Tourne sur chaque push main + PR vers main
  # ─────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # besoin de tout l'historique pour git ls-files

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Scan secrets & vulnérabilités
        run: node scripts/security-scan.js
        env:
          CI: true

      - name: Résumé si succès
        if: success()
        run: |
          echo ""
          echo "✅ Security scan OK — aucun secret ni nouvelle vuln critique."
